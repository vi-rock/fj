[tool.uv.workspace]
members = [
    "packages/core",
    "packages/db",
    "packages/config",
    "packages/observability",
    "services/api",
    "services/worker",
    "services/scheduler",
]

[tool.uv.sources]
config = { workspace = true }
db = { workspace = true }
core = { workspace = true }
observability = { workspace = true }

[dependency-groups]
dev = [
    "ruff",
    "pyright",
    "pre-commit",
]

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = [
    "E",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
]

[tool.ruff.format]
quote-style = "double"

[tool.pyright]
include = [
    "services",
    "packages",
]

pythonVersion = "3.14"

typeCheckingMode = "strict"