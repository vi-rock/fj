[tool.uv.workspace]
members = [
    "packages/core",
    "packages/db",
    "packages/config",
    "packages/observability",
    "services/api",
    "services/worker",
    "services/scheduler",
]

[tool.uv.sources]
config = { workspace = true }
db = { workspace = true }
core = { workspace = true }
observability = { workspace = true }

[dependency-groups]
dev = [
    "ruff",
    "pyright",
    "prek",
]

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
    "C90",
]

[tool.ruff.format]
quote-style = "double"

[tool.pyright]
include = [
    "services",
    "packages",
]

executionEnvironments = [
    { root = ".", extraPaths = [
        "services/api/src",
        "services/worker/src",
        "services/scheduler/src",
        "packages/config/src",
        "packages/core/src",
        "packages/db/src",
        "packages/observability/src",
    ]},
]

pythonVersion = "3.14"

typeCheckingMode = "strict"


[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = [
    "services",
    "packages",
]

markers = [
    "unit: fast isolated tests",
    "integration: tests requiring external services",
]