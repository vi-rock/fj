[tool.uv.workspace]
members = [
    "packages/core",
    "packages/db",
    "packages/config",
    "packages/observability",
    "services/api",
    "services/worker",
    "services/scheduler",
    "packages/application",
]

[tool.uv.sources]
config = { workspace = true }
db = { workspace = true }
core = { workspace = true }
observability = { workspace = true }

[dependency-groups]
dev = [
    "ruff",
    "prek",
    "ty>=0.0.58",
]

[tool.ruff]
target-version = "py314"
line-length = 100

[tool.ruff.lint]
select = [
    "E",
    "W",
    "F",
    "I",
    "UP",
    "B",
    "SIM",
    "C90",
]

[tool.ruff.format]
quote-style = "double"


[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = [
    "services",
    "packages",
]

markers = [
    "unit: fast isolated tests",
    "integration: tests requiring external services",
]
